name: Spring Helm package CI

on:
  push:
    branches:
      - 'develop'
    paths:
      - 'helm/spring/**'

jobs:
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package Helm Chart
        run: |
          mkdir tmp
          helm package helm/spring -d tmp

      - name: Clone package repo
        env:
          PACKAGE_REPO: https://github.com/earseo/infra-helm-pkg.git
        run: |
          git clone $PACKAGE_REPO

      - name: Copy tgz to package repo
        run: |
          cp tmp/*.tgz infra-helm-pkg/

      - name: Commit and Push to package repo
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          USER_NAME: jaewonLeeKOR
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          cd infra-helm-pkg
          helm repo index .
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add .
          git commit -m "Add new helm package $(date +"%Y-%m-%d %H:%M:%S")"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/earseo/infra-helm-pkg.git

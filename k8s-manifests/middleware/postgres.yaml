auth:
  enablePostgresUser: false
architecture: replication
replication:
  synchronousCommit: "on"
  numSynchronousReplicas: 1
primary:
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  initdb:
    scripts:
      01-init.sql: |
        CREATE DATABASE core;
        CREATE DATABASE member;
        CREATE DATABASE route;
        CREATE DATABASE sight;
        CREATE DATABASE story;
      02-enable-postgis.sql: |
        \c core
        CREATE EXTENSION IF NOT EXISTS postgis;
        \c route
        CREATE EXTENSION IF NOT EXISTS postgis;
        \c sight
        CREATE EXTENSION IF NOT EXISTS postgis;
        \c story
        CREATE EXTENSION IF NOT EXISTS postgis;
readReplicas:
  replicaCount: 1
service:
  type: ClusterIP
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

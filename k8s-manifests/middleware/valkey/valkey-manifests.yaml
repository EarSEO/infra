# 컨테이너 이미지 래퍼런스 https://hub.docker.com/r/valkey/valkey
---
# Valkey용 ConfigMap - 설정 파일 및 클러스터 초기화 스크립트 관리
apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-config
  namespace: valkey
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  valkey.conf: |
    # 클라이언트 포트
    port 6379
    # 클러스터 모드 활성화
    cluster-enabled yes
    # 클러스터 파일 경로
    cluster-config-file /data/nodes.conf
    # 클러스터 노드 연결 타임아웃
    cluster-node-timeout 5000
    # 데이터 영속성 로그 파일 활성화
    appendonly yes
    # AOF 파일 이름 지정
    appendfilename "appendonly.aof"
    # 데이터 파일 저장 디렉토리
    dir /data
    # 클러스터 통신을 위해서 보호모드 비활성화
    protected-mode no
    bind 0.0.0.0
    # 인증을 위한 패스워드
    requirepass ${VALKEY_PASSWORD}

---
# Valkey용 Headless Service - StatefulSet Pod 간 DNS 기반 검색 및 클러스터 통신 지원
apiVersion: v1
kind: Service
metadata:
  name: valkey-headless
  namespace: valkey
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  # headless 서비스로 Pod 직접 접근 가능한 DNS 엔트리 생성
  clusterIP: None
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
      name: client
    - port: 16379
      targetPort: 16379
      name: gossip

---
# Valkey 클라이언트 접근용 Service - 애플리케이션에서 캐시 접근 엔드포인트 제공
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: valkey
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
      name: client
  type: ClusterIP

---
# Valkey StatefulSet - 클러스터 모드로 실행되는 고가용성 인메모리 캐시 배포
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: valkey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Headless Service와 연결
  serviceName: valkey-headless
  replicas: 3
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:9.0.0
          # valkey-config 설정파일로 initialize
          command:
            - sh
            - -c
            - |
              sed "s/\${VALKEY_PASSWORD}/$VALKEY_PASSWORD/g" /etc/valkey/valkey.conf > /tmp/valkey.conf
              exec valkey-server /tmp/valkey.conf
          ports:
            # 클라이언트의 데이터 요청 처리 포트
            - containerPort: 6379
              name: client
            # 클러스터 노드 간 상태 동기화를 위한 포트
            - containerPort: 16379
              name: gossip
          volumeMounts:
            # 영속적 데이터 저장
            - name: valkey-data
              mountPath: /data
            # Configmap 마운트
            - name: config
              mountPath: /etc/valkey
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH="$VALKEY_PASSWORD" valkey-cli ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
              - sh
              - -c
              - REDISCLI_AUTH="$VALKEY_PASSWORD" valkey-cli ping
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-secret
                  key: VALKEY_PASSWORD
      volumes:
        - name: config
          configMap:
            name: valkey-config
  volumeClaimTemplates:
    - metadata:
        name: valkey-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
# 클러스터 초기화 Job
apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-cluster-init
  namespace: valkey
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Sync Hook으로 지정 (배포 시에만 실행)
    argocd.argoproj.io/hook: Sync
    # 성공 시 삭제
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  # 재시도 횟수
  backoffLimit: 10
  # Job 완료 후 리소스 정리 시간
  ttlSecondsAfterFinished: 100
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cluster-init
          image: valkey/valkey:9.0.0
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-secret
                  key: VALKEY_PASSWORD
          command:
            - sh
            - -c
            - |
              export REDISCLI_AUTH="$VALKEY_PASSWORD"
              
              # Valkey Pod 준비 대기
              echo "Waiting for Valkey pods to be ready..."
              until valkey-cli -h valkey-0.valkey-headless ping 2>/dev/null; do sleep 2; done
              until valkey-cli -h valkey-1.valkey-headless ping 2>/dev/null; do sleep 2; done
              until valkey-cli -h valkey-2.valkey-headless ping 2>/dev/null; do sleep 2; done
              
              # 이미 클러스터가 구성되어 있을경우 종료
              if valkey-cli -c -h valkey-0.valkey-headless cluster info 2>/dev/null | grep -q "cluster_state:ok"; then
                echo "Cluster already exists and is healthy"
                exit 0
              fi
              
              # 클러스터 생성
              echo "Creating Valkey cluster..."
              valkey-cli --cluster create \
                valkey-0.valkey-headless:6379 \
                valkey-1.valkey-headless:6379 \
                valkey-2.valkey-headless:6379 \
                --cluster-replicas 0 \
                --cluster-yes
              
              # 클러스터 생성 확인
              echo "Cluster created successfully!"
              valkey-cli -c -h valkey-0.valkey-headless cluster nodes
